<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Now — CDN Live TV</title>
  <meta name="description" content="All live sports events streaming right now. Free, no auth required.">
  <meta name="theme-color" content="#09090b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>�</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="live" class="has-mobile-nav">

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="CDN Live TV Home">
        
        <span class="logo-text">CDN Live TV</span>
        <span class="logo-sub">Free Sports Streams</span>
      </a>
      <nav class="page-nav" aria-label="Main navigation">
        <a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="cricket.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8l-4 4h3v4h2v-4h3z"/></svg>
          Cricket
        </a>
        <a href="live.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49m11.31-2.82a10 10 0 010 14.14m-14.14 0a10 10 0 010-14.14"/></svg>
          Live
        </a>
        <a href="channels.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Channels
        </a>
      </nav>
      <div class="header-actions">
        <div class="status-pill" aria-live="polite">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Loading…</span>
          <span id="last-update" style="margin-left:3px;opacity:0.5"></span>
        </div>
      </div>
    </div>
    <!-- Mobile search bar (below header, centered) -->
    <div class="container mobile-search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="mobile-search-input-header" placeholder="Search live events…" aria-label="Search channels" oninput="document.getElementById('search-input')?.value=this.value;document.getElementById('search-input')?.dispatchEvent(new Event('input'))">
      </div>
    </div>
  </header>

  <main class="container" style="padding-top:24px;padding-bottom:24px;">


    <!-- Stats -->
    <div class="stats-row" role="status" aria-label="Live statistics">
      <div class="stat-card">
        <div class="stat-value live" id="stat-live">0</div>
        <div class="stat-label">Live Events</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-sports">0</div>
        <div class="stat-label">Sports</div>
      </div>
      <div class="stat-card">
        <div class="stat-value accent" id="stat-channels">0</div>
        <div class="stat-label">Channels</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-viewers">0</div>
        <div class="stat-label">Viewers</div>
      </div>
    </div>

    <!-- Live Events -->
    <section class="section" aria-label="Live events">
      <div class="section-header">
        <div class="section-title">
          <span style="color:var(--red);font-size:8px">●</span>
          Live Events
          <span class="count" id="events-count">0</span>
        </div>
      </div>
      <div class="events-grid" id="events-container">
        <div class="skeleton"><span class="skeleton-text">Fetching live events…</span></div>
      </div>
    </section>

    <div class="shortcuts-hint">
      <span class="kbd">R</span> Refresh
    </div>
  </main>

  <footer class="footer">
    Powered by <a href="https://cdnlivetv.tv" target="_blank" rel="noopener">CDN Live TV</a> · Free API · Auto-refreshes every 60s
  </footer>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="cricket.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
      Cricket
    </a>
    <a href="live.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49"/></svg>
      Live
    </a>
    <a href="channels.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Channels
    </a>
  </nav>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script src="js/utils.js"></script>
</body>
</html>
